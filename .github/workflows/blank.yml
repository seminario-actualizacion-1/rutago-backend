name: Deploy Backend Express

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Deploy files to VPS via rsync
        uses: up9cloud/action-rsync@v1.4
        env:
          HOST: ${{ secrets.HOST }}
          USER: ${{ secrets.USER_NAME_RUTA_GO }}
          KEY: ${{ secrets.PASSWORD_SSH }}
          SOURCE: ./
          TARGET: /home/${{ secrets.USER_NAME_RUTA_GO }}/backend/

      - name: Run Database Init and Start App via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME_RUTA_GO }}
          key: ${{ secrets.PASSWORD_SSH }}
          port: 22
          script: |
            cd ~/backend
            
            # 1. Instalar dependencias en el servidor
            npm install --production
            
            # 2. Inicializar la base de datos
            HOST="${{ secrets.HOST }}" \
            USER_DB="${{ secrets.USER_DB }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            DB_NAME="${{ secrets.DB_NAME }}" \
            node init-db.js
            
            # 3. Iniciar o reiniciar con PM2 usando npx (evita el command not found)
            PORT=8082 \
            HOST="${{ secrets.HOST }}" \
            USER_DB="${{ secrets.USER_DB }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            DB_NAME="${{ secrets.DB_NAME }}" \
            npx pm2 restart express-back || \
            PORT=8082 \
            HOST="${{ secrets.HOST }}" \
            USER_DB="${{ secrets.USER_DB }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            DB_NAME="${{ secrets.DB_NAME }}" \
            npx pm2 start index.js --name "express-back"

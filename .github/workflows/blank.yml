name: Deploy Backend RutaGo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USER_NAME_RUTA_GO }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.PASSWORD_SSH }}

      - name: Upload deploy script
        run: |
          mkdir -p .github/scripts
          cp .github/scripts/deploy.sh /tmp/deploy.sh

      - name: Run remote deploy script
        run: |
          set -e

          chmod +x /tmp/deploy.sh

          for intento in 1 2 3 4 5; do
            echo "Intento SSH $intento de 5..."

            if scp /tmp/deploy.sh "$SSH_USER@$SSH_HOST:/tmp/deploy.sh"; then
              if ssh -T \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=20 \
                -o ServerAliveInterval=15 \
                -o ServerAliveCountMax=3 \
                "$SSH_USER@$SSH_HOST" \
                "bash /tmp/deploy.sh \"$SSH_HOST\" \"$SSH_USER\""; then
                exit 0
              fi
            fi

            echo "No fue posible conectar. Reintentando..."
            sleep 15
          done

          echo "No fue posible conectar al servidor después de 5 intentos."
          exit 1

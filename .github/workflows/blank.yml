name: Deploy Backend RutaGo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USER_NAME_RUTA_GO }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.PASSWORD_SSH }}

      - name: Deploy to server
        run: |
          set -e

          for intento in 1 2 3 4 5; do
            echo "Intento SSH $intento de 5..."

            if ssh \
              -T \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=3 \
              "$SSH_USER@$SSH_HOST" <<EOF
                set -Eeuo pipefail

                echo "Desplegando RutaGo Backend..."

                cd "/home/$SSH_USER/backend"

                export NODE_ENV=production

                echo "→ Actualizando repositorio..."
                git pull origin main

                echo "→ Instalando dependencias..."
                npm install

                echo "→ Ejecutando migraciones..."
                npx sequelize-cli db:migrate --env production

                echo "→ Reiniciando servicio..."
                sudo systemctl restart rutago.service

                echo "→ Verificando servicio..."
                sudo systemctl is-active --quiet rutago.service

                echo "✅ Deploy finalizado."
            EOF
            then
              exit 0
            fi

            echo "No fue posible conectar. Reintentando..."
            sleep 15
          done

          echo "No fue posible conectar al servidor después de 5 intentos."
          exit 1

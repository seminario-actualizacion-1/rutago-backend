name: Deploy Backend Express

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME_RUTA_GO }}
          key: ${{ secrets.PASSWORD_SSH }}  # Corregido: Se usa 'key' porque el secreto guarda una SSH Key, no una contraseña
          port: 22
          script: |
            # 1. Crear la carpeta backend en el HOME si no existe
            mkdir -p ~/backend
            cd ~/backend
            
            # 2. Sincronizar el código desde tu repositorio
            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/seminario-actualizacion-1/rutago-backend.git .
            else
              git pull origin main
            fi
            
            # 3. Instalar las dependencias de producción
            npm install --production
            
            # 4. EJECUTAR EL SCRIPT DE INICIALIZACIÓN DE LA BD
            # Le pasamos los secretos para que pueda crear la tabla en el VPS
            HOST="${{ secrets.HOST }}" \
            USER_DB="${{ secrets.USER_DB }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            DB_NAME="${{ secrets.DB_NAME }}" \
            node init-db.js
            
            # 5. Configurar las variables de entorno e iniciar/reiniciar con PM2
            PORT=8082 \
            HOST="${{ secrets.HOST }}" \
            USER_DB="${{ secrets.USER_DB }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            DB_NAME="${{ secrets.DB_NAME }}" \
            pm2 restart express-back || \
            PORT=8082 \
            HOST="${{ secrets.HOST }}" \
            USER_DB="${{ secrets.USER_DB }}" \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            DB_NAME="${{ secrets.DB_NAME }}" \
            pm2 start index.js --name "express-back"

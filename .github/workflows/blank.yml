name: Deploy Backend Express

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Comprime el proyecto limpio listo para producción (sin .git ni node_modules)
      - name: Compress project files
        run: |
          mkdir ../build_tmp
          cp -r . ../build_tmp/
          rm -rf ../build_tmp/.git ../build_tmp/node_modules
          tar -czf backend.tar.gz -C ../build_tmp .
          rm -rf ../build_tmp

      # PASO 1: Subir el archivo comprimido al servidor mediante SCP
      - name: Transfer Compressed File via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME_RUTA_GO }}
          key: ${{ secrets.PASSWORD_SSH }}
          port: 22
          source: "backend.tar.gz"
          target: "/home/${{ secrets.USER_NAME_RUTA_GO }}/backend_tmp/"

      # PASO 2: Procesar en el servidor (Limpiar, Descomprimir, Instalar, Configurar .env y Reiniciar)
      - name: Extract, Install and Restart via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER_NAME_RUTA_GO }}
          key: ${{ secrets.PASSWORD_SSH }}
          port: 22
          script_stop: true
          script: |
            # Crear la carpeta de producción si no existe
            mkdir -p ~/backend

            # Mover el comprimido a la ruta definitiva
            mv ~/backend_tmp/backend.tar.gz ~/backend/
            rm -rf ~/backend_tmp

            cd ~/backend

            # Guardar temporalmente el archivo nuevo y fulminar TODO el código viejo
            mkdir ../tmp_tar
            mv backend.tar.gz ../tmp_tar/
            rm -rf *
            mv ../tmp_tar/backend.tar.gz .
            rm -rf ../tmp_tar

            # Descomprimir el nuevo código fuente de Express
            tar -xzf backend.tar.gz
            rm backend.tar.gz

            # Crear index.js proxy para apuntar a src/index.js (el servicio ejecuta node index.js)
            echo "require('./src/index.js');" > index.js

            # Crear archivo .env con variables de entorno del servidor
            echo "PORT=8082" > .env
            echo "HOST=localhost" >> .env
            echo "PORT_DB='${{ secrets.PORT_DB }}'" >> .env
            echo "USER_DB='${{ secrets.USER_DB }}'" >> .env
            echo "DB_PASSWORD='${{ secrets.DB_PASSWORD }}'" >> .env
            echo "DB_NAME='${{ secrets.DB_NAME }}'" >> .env
            echo "JWT_SECRET='${{ secrets.JWT_SECRET }}'" >> .env

            # Instalar dependencias limpias de producción
            npm install --omit=dev

            # Ejecutar migraciones de Sequelize en el servidor
            npx sequelize-cli db:migrate

            # Ejecutar seeders en el servidor
            npx sequelize-cli db:seed:all --seeders-path src/seeders

            # Reiniciar el servicio de Systemd (Aprovechando el NOPASSWD del sudoers)
            sudo systemctl restart rutago.service

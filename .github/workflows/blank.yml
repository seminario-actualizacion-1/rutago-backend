name: Deploy Backend RutaGo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SSH_HOST: ${{ secrets.HOST }}
      SSH_USER: ${{ secrets.USER_NAME_RUTA_GO }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.PASSWORD_SSH }}

      - name: Run remote deploy script
        run: |
          set -Eeuo pipefail

          PORT="${SSH_PORT:-22}"

          for intento in 1 2 3 4 5; do
            echo "Intento SSH $intento de 5..."

            if ssh \
              -T \
              -p "$PORT" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=3 \
              "$SSH_USER@$SSH_HOST" \
              'bash -s' < .github/scripts/deploy.sh
            then
              echo "Despliegue completado."
              exit 0
            fi

            echo "Falló el intento SSH $intento."

            if [ "$intento" -lt 5 ]; then
              echo "Reintentando en 15 segundos..."
              sleep 15
            fi
          done

          echo "No fue posible desplegar después de 5 intentos."
          exit 1

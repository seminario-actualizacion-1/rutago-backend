name: Deploy Backend RutaGo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy RutaGo Backend
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar llave SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.PASSWORD_SSH }}

      - name: Verificar conexión SSH
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USER_NAME_RUTA_GO }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -Eeuo pipefail

          PORT="${SSH_PORT:-22}"

          for intento in 1 2 3 4 5; do
            echo "Intento SSH $intento de 5..."

            if ssh \
              -T \
              -p "$PORT" \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              -o ConnectionAttempts=1 \
              "$SSH_USER@$SSH_HOST" \
              "echo 'Conexión SSH correcta'"
            then
              echo "✅ Servidor disponible por SSH."
              exit 0
            fi

            if [ "$intento" -lt 5 ]; then
              echo "No fue posible conectar. Reintentando..."
              sleep 15
            fi
          done

          echo "❌ No fue posible establecer conexión SSH."
          exit 1

      - name: Ejecutar despliegue
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USER_NAME_RUTA_GO }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -Eeuo pipefail

          PORT="${SSH_PORT:-22}"

          ssh \
            -T \
            -p "$PORT" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" \
            "bash -s" < .github/scripts/deploy.sh
